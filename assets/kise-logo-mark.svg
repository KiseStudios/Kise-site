<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 620" role="img" aria-labelledby="title desc">
  <title id="title">Kise Studios KS mark</title>
  <desc id="desc">A textured silver KS monogram with an abstract leaf crossing the letters.</desc>
  <defs>
    <filter id="paper-grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" seed="12" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="grain">
        <feFuncA type="table" tableValues="0 0.5"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="grain" mode="multiply"/>
    </filter>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000000" flood-opacity="0.46"/>
    </filter>
    <linearGradient id="silver" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#fffaf0"/>
      <stop offset="35%" stop-color="#d8d4ca"/>
      <stop offset="62%" stop-color="#f4efe4"/>
      <stop offset="100%" stop-color="#aaa59a"/>
    </linearGradient>
    <radialGradient id="smoke" cx="45%" cy="48%" r="58%">
      <stop offset="0%" stop-color="#0b0b09" stop-opacity="0.58"/>
      <stop offset="36%" stop-color="#171612" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g filter="url(#soft-shadow)">
    <text x="70" y="500"
      fill="url(#silver)"
      filter="url(#paper-grain)"
      font-family="Cormorant Garamond, Georgia, 'Times New Roman', serif"
      font-size="455"
      font-weight="700"
      letter-spacing="-54">KS</text>

    <text x="70" y="500"
      fill="url(#smoke)"
      font-family="Cormorant Garamond, Georgia, 'Times New Roman', serif"
      font-size="455"
      font-weight="700"
      letter-spacing="-54">KS</text>

    <path d="M380 403C458 213 568 154 681 137C608 222 508 333 380 403Z"
      fill="none"
      stroke="#ece8de"
      stroke-width="18"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.92"/>
    <path d="M396 393C455 285 523 217 636 168"
      fill="none"
      stroke="#11110f"
      stroke-width="10"
      stroke-linecap="round"
      opacity="0.7"/>
  </g>
</svg>
