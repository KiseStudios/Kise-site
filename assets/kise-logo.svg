<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Kise Studios</title>
  <desc id="desc">Monograma KS escuro com textura sobre fundo transparente.</desc>
  <defs>
    <linearGradient id="ink" x1="33" y1="40" x2="222" y2="216" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#73726a"/>
      <stop offset="0.28" stop-color="#111615"/>
      <stop offset="0.58" stop-color="#7a7b72"/>
      <stop offset="0.82" stop-color="#151817"/>
      <stop offset="1" stop-color="#8b897f"/>
    </linearGradient>
    <filter id="soft-grain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" seed="12" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.34"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <mask id="monogram">
      <rect width="256" height="256" fill="#000"/>
      <text x="21" y="205" fill="#fff" font-family="Georgia, 'Times New Roman', serif" font-size="190" font-weight="700" letter-spacing="-23">K</text>
      <text x="101" y="205" fill="#fff" font-family="Georgia, 'Times New Roman', serif" font-size="188" font-weight="700" letter-spacing="-8">S</text>
      <path d="M136 58c-23 24-39 56-49 96 30-14 50-43 49-96Z" fill="#fff"/>
      <path d="M151 52c-17 55-45 103-84 145" fill="none" stroke="#000" stroke-width="13" stroke-linecap="round"/>
      <path d="M133 70c-10 34-28 63-54 87" fill="none" stroke="#000" stroke-width="8" stroke-linecap="round"/>
    </mask>
  </defs>
  <rect width="256" height="256" fill="url(#ink)" filter="url(#soft-grain)" mask="url(#monogram)"/>
</svg>
